name: 分子对接提交

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: 项目名称
        required: true
        default: dock_project
      center_x:
        description: center_x
        required: true
        default: "0"
      center_y:
        description: center_y
        required: true
        default: "0"
      center_z:
        description: center_z
        required: true
        default: "0"
      size_x:
        description: size_x
        required: true
        default: "22"
      size_y:
        description: size_y
        required: true
        default: "22"
      size_z:
        description: size_z
        required: true
        default: "22"
      receptor_b64:
        description: 受体文件(base64)
        required: false
        default: ""
      ligand_b64:
        description: 配体文件(base64)
        required: false
        default: ""

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CLUSTER_SSH_KEY }}

      - name: Submit docking
        shell: bash
        env:
          HOST: ${{ secrets.CLUSTER_HOST }}
          PORT: ${{ secrets.CLUSTER_PORT }}
          USER: ${{ secrets.CLUSTER_USER }}
          PROJ: ${{ github.event.inputs.project_name }}
          CX: ${{ github.event.inputs.center_x }}
          CY: ${{ github.event.inputs.center_y }}
          CZ: ${{ github.event.inputs.center_z }}
          SX: ${{ github.event.inputs.size_x }}
          SY: ${{ github.event.inputs.size_y }}
          SZ: ${{ github.event.inputs.size_z }}
          RECEPTOR: ${{ github.event.inputs.receptor_b64 }}
          LIGAND: ${{ github.event.inputs.ligand_b64 }}
        run: |
          TS=$(date +%Y%m%d_%H%M%S)
          JOB_NAME="${PROJ}_${TS}"
          OUT_DIR="run/HZJ/docking/${JOB_NAME}"

          ssh -o StrictHostKeyChecking=no -p ${PORT} ${USER}@${HOST} "mkdir -p ~/${OUT_DIR}"

          if [ -n "${RECEPTOR}" ]; then
            echo "${RECEPTOR}" | base64 -d > /tmp/receptor.pdbqt
            scp -o StrictHostKeyChecking=no -P ${PORT} /tmp/receptor.pdbqt ${USER}@${HOST}:~/${OUT_DIR}/receptor.pdbqt
          fi

          if [ -n "${LIGAND}" ]; then
            echo "${LIGAND}" | base64 -d > /tmp/ligand.pdbqt
            scp -o StrictHostKeyChecking=no -P ${PORT} /tmp/ligand.pdbqt ${USER}@${HOST}:~/${OUT_DIR}/ligand.pdbqt
          fi

          ssh -o StrictHostKeyChecking=no -p ${PORT} ${USER}@${HOST} "~/run/HZJ/bin/submit_dock.sh '${PROJ}' '${CX}' '${CY}' '${CZ}' '${SX}' '${SY}' '${SZ}' '${OUT_DIR}'"

          echo "Job: ${JOB_NAME}"
          echo "Output: ~/${OUT_DIR}/"
