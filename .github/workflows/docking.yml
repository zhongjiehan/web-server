name: 分子对接提交

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: 项目名称
        required: true
        default: dock_project
      center_x:
        description: center_x
        required: true
        default: "0"
      center_y:
        description: center_y
        required: true
        default: "0"
      center_z:
        description: center_z
        required: true
        default: "0"
      size_x:
        description: size_x
        required: true
        default: "22"
      size_y:
        description: size_y
        required: true
        default: "22"
      size_z:
        description: size_z
        required: true
        default: "22"

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CLUSTER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.CLUSTER_PORT }} ${{ secrets.CLUSTER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Submit job
        shell: bash
        env:
          HOST: ${{ secrets.CLUSTER_HOST }}
          PORT: ${{ secrets.CLUSTER_PORT }}
          USER: ${{ secrets.CLUSTER_USER }}
          CX: ${{ github.event.inputs.center_x }}
          CY: ${{ github.event.inputs.center_y }}
          CZ: ${{ github.event.inputs.center_z }}
          SX: ${{ github.event.inputs.size_x }}
          SY: ${{ github.event.inputs.size_y }}
          SZ: ${{ github.event.inputs.size_z }}
          PROJ: ${{ github.event.inputs.project_name }}
        run: |
          TS=$(date +%Y%m%d_%H%M%S)
          JOB_NAME="${PROJ}_${TS}"
          OUT_DIR="run/HZJ/docking/${JOB_NAME}"

          cat > /tmp/job.sh << EOFSBATCH
          #!/bin/bash
          #SBATCH -p vip_gpu_4090_scxk410
          #SBATCH --gres=gpu:1
          #SBATCH -t 01:00:00
          #SBATCH --output=slurm-%j.out
          export PATH=/data/apps/cuda/12.8/bin:\${PATH}
          export LD_LIBRARY_PATH=/data/apps/cuda/12.8/lib64:\${LD_LIBRARY_PATH}
          mkdir -p ~/${OUT_DIR}
          cd ~/${OUT_DIR}
          echo "=== Docking: ${PROJ} ==="
          echo "Box: ${CX} ${CY} ${CZ}  Size: ${SX} ${SY} ${SZ}"
          ~/run/HZJ/bin/vina_gpu --lfile ligand.pdbqt --ffile receptor.maps.fld --nrun 20 --gbest 1 --resnam result
          echo "=== Done ==="
          EOFSBATCH

          chmod +x /tmp/job.sh
          ssh -o StrictHostKeyChecking=no -p ${PORT} ${USER}@${HOST} "mkdir -p ~/${OUT_DIR}" < /dev/null
          scp -o StrictHostKeyChecking=no -P ${PORT} /tmp/job.sh ${USER}@${HOST}:~/${OUT_DIR}/job.sh
          ssh -o StrictHostKeyChecking=no -p ${PORT} ${USER}@${HOST} "cd ~/${OUT_DIR} && sbatch job.sh" < /dev/null

          echo "Job submitted: ${JOB_NAME}"
          echo "Output: ~/${OUT_DIR}/"
