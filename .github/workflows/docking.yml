name: 分子对接提交

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: 项目名称
        required: true
        default: dock_project
      center_x:
        description: center_x
        required: true
        default: "0"
      center_y:
        description: center_y
        required: true
        default: "0"
      center_z:
        description: center_z
        required: true
        default: "0"
      size_x:
        description: size_x
        required: true
        default: "22"
      size_y:
        description: size_y
        required: true
        default: "22"
      size_z:
        description: size_z
        required: true
        default: "22"

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CLUSTER_SSH_KEY }}

      - name: Submit job
        shell: bash
        env:
          HOST: ${{ secrets.CLUSTER_HOST }}
          PORT: ${{ secrets.CLUSTER_PORT }}
          USER: ${{ secrets.CLUSTER_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no -p ${PORT} ${USER}@${HOST} "~/run/HZJ/bin/submit_dock.sh '${{ github.event.inputs.project_name }}' '${{ github.event.inputs.center_x }}' '${{ github.event.inputs.center_y }}' '${{ github.event.inputs.center_z }}' '${{ github.event.inputs.size_x }}' '${{ github.event.inputs.size_y }}' '${{ github.event.inputs.size_z }}'"
