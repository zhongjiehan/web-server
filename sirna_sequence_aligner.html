<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>siRNA 工具</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: "Microsoft YaHei",Arial,sans-serif; margin: 24px; color:#1f2937; background:#f8fafc; }
    .header { display:flex; align-items:center; gap:14px; margin-bottom:4px; }
    .header img { height:40px; width:auto; }
    .header h1 { margin:0; font-size:24px; }
    .subtitle { color:#64748b; margin-bottom:16px; font-size:13px; }
    .hint { color:#475569; margin-bottom:16px; line-height:1.7; font-size:13px; background:#f1f5f9; padding:10px 14px; border-radius:8px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    label { font-weight:700; display:block; margin-bottom:6px; }
    textarea { width:100%; box-sizing:border-box; font-family:Consolas,"Courier New",monospace; font-size:15px; padding:10px; border:1px solid #cbd5e1; border-radius:8px; background:white; }
    .seq-input { min-height:80px; resize:vertical; }
    .batch-input { min-height:150px; resize:vertical; }
    button { margin:10px 6px 10px 0; padding:9px 14px; border:0; border-radius:8px; background:#2563eb; color:white; font-weight:700; cursor:pointer; font-size:13px; }
    button.secondary { background:#475569; }
    .section-border { border:2px solid #dbeafe; border-radius:12px; padding:16px; margin-bottom:20px; background:white; }
    .section-border h2 { margin:0 0 4px; font-size:18px; color:#1e40af; display:flex; align-items:center; gap:6px; }
    .section-border .desc { color:#64748b; font-size:13px; margin-bottom:10px; }
    .section-border.warn { border-color:#fef3c7; }
    .section-border.warn h2 { color:#92400e; }
    .muted { color:#64748b; font-size:13px; }
    .stats { font-size:12px; color:#64748b; margin:4px 0; }
    .legend { display:flex; gap:12px; margin:8px 0; font-size:12px; flex-wrap:wrap; }
    .legend-item { display:flex; align-items:center; gap:4px; white-space:nowrap; }
    .legend-swatch { display:inline-block; width:14px; height:14px; border-radius:3px; border:1px solid #cbd5e1; }
    .separator { border-top:1px dashed #e2e8f0; margin:10px 0; }
    .nt { display:inline-block; font-family:Consolas,"Courier New",monospace; font-size:14px; padding:0 2px; margin:1px; border-radius:3px; line-height:1.6; }
    .mod-OMe { background:#dbeafe; color:#1e40af; }
    .mod-F { background:#fce7f3; color:#9d174d; }
    .mod-DNA { background:#fef3c7; color:#92400e; }
    .mod-VP { background:#d1fae5; color:#065f46; }
    .mod-C22 { background:#ede9fe; color:#5b21b6; }
    .mod-eF { background:#ffe4e6; color:#9f1239; }
    .mod-RNA { background:#cffafe; color:#0e7490; }
    .mod-OTHER { background:#f1f5f9; color:#475569; }
    .mod-LINKER { background:#f8fafc; color:#94a3b8; font-size:13px; }
    .mod-BACKBONE { background:#f1f5f9; color:#cbd5e1; font-size:12px; }
    .mod-seq { display:flex; flex-wrap:wrap; align-items:center; gap:2px; padding:6px 8px; border-radius:6px; border:1px solid #e2e8f0; background:white; line-height:2; }
    .result-block { margin-top:10px; margin-bottom:14px; }
    .pair-header { font-weight:700; color:#1e293b; font-size:14px; margin-bottom:4px; display:flex; align-items:center; gap:6px; }
    .pair-view { margin-top:10px; padding:6px 8px; border-radius:6px; border:1px solid #e2e8f0; background:#fafbfc; overflow-x:auto; }
    .pair-row { display:flex; align-items:center; gap:0; white-space:nowrap; }
    .pair-label { font-size:11px; color:#64748b; min-width:70px; text-align:right; padding-right:6px; flex-shrink:0; }
    .pair-cell { display:inline-flex; flex-direction:column; align-items:center; min-width:26px; font-size:13px; text-align:center; }
    .pair-base { font-family:Consolas,"Courier New",monospace; font-weight:700; padding:0 2px; border-radius:2px; }
    .pair-pos { font-size:9px; color:#94a3b8; line-height:1; }
    .summary-bar { background:#f0fdf4; border:1px solid #bbf7d0; border-radius:6px; padding:6px 10px; margin:6px 0; font-size:13px; }
    .summary-bar.warn { background:#fffbeb; border-color:#fde68a; }
    .tag { display:inline-block; padding:1px 6px; border-radius:4px; font-size:11px; font-weight:700; }
    .tag-ok { background:#dcfce7; color:#166534; }
    .tag-bad { background:#fef2f2; color:#991b1b; }
    .footer-info { margin-top:18px; padding:12px 14px; border-radius:10px; background:#f1f5f9; color:#475569; font-size:13px; line-height:1.7; text-align:center; }
    .batch-group { border:1px solid #e2e8f0; border-radius:8px; padding:10px; margin-bottom:10px; }
    @media (max-width:800px) { .grid { grid-template-columns:1fr; } body { margin:12px; } }
  </style>
</head>
<body>

<div class="header">
  <img src="logo.png" alt="SUNNOVO">
  <h1>🧬 siRNA 序列工具</h1>
</div>
<div class="subtitle">修饰可视化 · 格式对比 · 配对校验</div>

<!-- ===== 格式对比（最上层） ===== -->
<div class="section-border" style="border-color:#ede9fe;">
  <h2>🔄 格式对比 <span class="muted" style="font-weight:400;font-size:13px;">—— 对比订单写法 vs 报告写法是否等价</span></h2>
  <div class="desc">同一 siRNA 在订单和反馈报告中可能使用不同语法（如 <code>VPu</code> vs <code>VPmU</code>）。输入两种写法，工具自动解析修饰并逐位对比。</div>

  <!-- 单条 -->
  <div class="grid">
    <div>
      <label for="cmpA">序列 A <span class="muted">（订单写法）</span></label>
      <textarea id="cmpA" class="seq-input" placeholder="例如：VPusAsacaUaauuaucAuCauuagsgsc"></textarea>
    </div>
    <div>
      <label for="cmpB">序列 B <span class="muted">（报告/反馈写法）</span></label>
      <textarea id="cmpB" class="seq-input" placeholder="例如：VPmUfAmAmCmAfUmAmAmUmUmAmUmCfAmUfCmAmUmUmAmGmGmC"></textarea>
    </div>
  </div>
  <div>
    <button onclick="runCompare()">🔄 对比格式</button>
    <button class="secondary" onclick="fillCompareExample()">📋 填入示例</button>
  </div>
  <div id="cmpResult" style="margin-top:12px;display:none;">
    <div class="separator"></div>
    <div id="cmpLegend" class="legend"></div>
    <div id="cmpResultArea"></div>
  </div>

  <!-- 批量 -->
  <div style="margin-top:16px;border-top:1px dashed #e2e8f0;padding-top:14px;">
    <h3 style="font-size:15px;margin:0 0 6px;color:#6d28d9;">📋 批量格式对比</h3>
    <label for="batchCmpInput">粘贴两列（序列A / 序列B），每行自动对比，结果与单条一致</label>
    <textarea id="batchCmpInput" class="batch-input" placeholder="序列A（订单）&#9;序列B（报告）&#10;...&#9;..."></textarea>
    <div>
      <button onclick="runBatchCompare()">📊 批量对比</button>
      <button class="secondary" onclick="fillBatchCompareExample()">📋 填入批量示例</button>
    </div>
    <div id="batchCmpResult" style="margin-top:12px;display:none;">
      <div class="separator"></div>
      <div id="batchCmpSummary" class="summary-bar"></div>
      <div id="batchCmpResultArea"></div>
    </div>
  </div>
</div>

<!-- ===== siRNA修饰可视化（最下层） ===== -->
<div class="section-border warn">
  <h2>🧬 siRNA 修饰可视化 <span class="muted" style="font-weight:400;font-size:13px;">—— 查看两条链上每个核苷酸的修饰类型及配对关系</span></h2>
  <div class="desc">输入同一 siRNA 的 Sense 和 Antisense 链，每种修饰用不同颜色标出。自动验证碱基配对（A↔U, C↔G）。</div>

  <div class="grid">
    <div>
      <label for="senseInput">Sense(5'-3') <span class="muted">（可选）</span></label>
      <textarea id="senseInput" class="seq-input" placeholder="可选"></textarea>
    </div>
    <div>
      <label for="antiInput">Antisense(5'-3') <span style="color:#c00000;">*必填</span></label>
      <textarea id="antiInput" class="seq-input" placeholder="例如：VPmUfAmAmCmAfUmAmAmUmUmAmUmCfAmUfCmAmUmUmAmGmGmC"></textarea>
    </div>
  </div>
  <div>
    <button onclick="runSingle()">🔍 查看</button>
    <button class="secondary" onclick="fillExample()">📋 填入示例</button>
  </div>
  <div id="singleResult" style="margin-top:12px;display:none;">
    <div class="separator"></div>
    <div id="singleLegend" class="legend"></div>
    <div id="singleResultArea"></div>
    <div id="singlePairView"></div>
  </div>

  <div style="margin-top:16px;border-top:1px dashed #e2e8f0;padding-top:14px;">
    <h3 style="font-size:15px;margin:0 0 6px;color:#92400e;">📊 批量查看</h3>
    <label for="batchInput">粘贴两列（Sense / Antisense），批量查看修饰分布</label>
    <textarea id="batchInput" class="batch-input" placeholder="Sense(5'-3')&#9;Antisense(5'-3')"></textarea>
    <div>
      <button onclick="runBatch()">📊 批量查看</button>
      <button class="secondary" onclick="fillBatchExample()">📋 填入批量示例</button>
    </div>
    <div id="batchResult" style="margin-top:12px;display:none;">
      <div class="separator"></div>
      <div id="batchLegend" class="legend"></div>
      <div id="batchResultArea"></div>
    </div>
  </div>
</div>

<div class="footer-info">by 创新办公室，韩中杰</div>

<script>
function esc(s){return String(s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]||c;});}
function isB(ch){return /[ACGUTIacguti]/.test(ch||"");}

function parseTokens(seq) {
  var tokens=[]; var i=0; var pos=0;
  while(i<seq.length){
    var ch=seq[i];
    if(/\s/.test(ch)){i++;continue;}
    if(seq.startsWith("VP",i)){
      var ve=i+2,vb="";
      while(ve<seq.length){
        var vc=seq[ve];if(isB(vc)){vb=vc.toUpperCase();ve++;break;}
        if("mfder".includes(vc)&&ve+1<seq.length&&isB(seq[ve+1])){vb=seq[ve+1].toUpperCase();ve+=2;break;}
        ve++;}
      if(vb){while(ve<seq.length&&"sS".includes(seq[ve]))ve++;tokens.push({base:vb,text:seq.slice(i,ve),mod:"VP",pos:++pos});i=ve;continue;}
    }
    if(ch==="("||ch==="["){var cl=ch==="("?")":"]",j=seq.indexOf(cl,i+1);if(j>-1){var tb=seq.slice(i,j+1),m=tb.match(/[ACGUTacgut]/);if(m){tokens.push({base:m[0].toUpperCase(),text:tb,mod:"C22",pos:++pos});i=j+1;continue;}}}
    if(ch==="-"){var nx=seq[i+1];if(nx&&nx.match(/[ACGUTacgut]/i)){var nn=seq[i+2];if((nx==='d'||nx==='D')&&nn&&isB(nn)){tokens.push({base:nn.toUpperCase(),text:"-d"+nn+"-",mod:"DNA",pos:++pos});i+=3;continue;}}tokens.push({base:"-",text:"-",mod:"LINKER",pos:0});i++;continue;}
    if((ch==="m"||ch==="f"||ch==="d"||ch==="e"||ch==="r")&&isB(seq[i+1])){
      var mp=ch,b1=seq[i+1].toUpperCase(),t1=seq.slice(i,i+2),mm={m:"OMe",f:"F",d:"DNA",e:"eF",r:"RNA"},m1=mm[mp]||"OTHER",j1=i+2;
      while(j1<seq.length&&"sS".includes(seq[j1])){t1+=seq[j1];j1++;}
      tokens.push({base:b1,text:t1,mod:m1,pos:++pos});i=j1;continue;
    }
    if(isB(ch)&&seq[i+1]==="f"){var b3=ch.toUpperCase(),t3=ch+"f",j3=i+2;if(seq[j3]==="s"||seq[j3]==="S"){t3+=seq[j3].toLowerCase();j3++;}tokens.push({base:b3,text:t3,mod:"F",pos:++pos});i=j3;continue;}
    if(ch==="s"||ch==="S"||ch==="*"){tokens.push({base:"s",text:ch==="*"?"*":"s",mod:"BACKBONE",pos:0});i++;continue;}
    if(isB(ch)){var b4=ch.toUpperCase(),m4=ch===ch.toLowerCase()?"OMe":"F",t4=ch,j4=i+1;while(j4<seq.length&&"sS".includes(seq[j4])){t4+=seq[j4];j4++;}tokens.push({base:b4,text:t4,mod:m4,pos:++pos});i=j4;continue;}
    i++;
  }
  return tokens;
}

function getBases(tokens){var r="";for(var i=0;i<tokens.length;i++){var b=tokens[i].base;if(b&&b!=="-"&&b!=="s"&&b!=="*")r+=b;}return r;}
function analyze(seq){var t=parseTokens(seq),b=getBases(t),s={};for(var i=0;i<t.length;i++){var p=t[i].pos;if(p>0){if(!s[t[i].mod])s[t[i].mod]=0;s[t[i].mod]++;}}return{tokens:t,bases:b,stats:s,seq:seq};}
function renderTokens(tokens){var h='<div class="mod-seq">';for(var i=0;i<tokens.length;i++){var t=tokens[i];h+='<span class="nt mod-'+t.mod+'">'+esc(t.text)+'</span>';}return h+'</div>';}
function makeStatStr(stats,total){var parts=[];var order=["VP","OMe","F","DNA","C22","eF","RNA","OTHER"];for(var o=0;o<order.length;o++){var k=order[o];if(stats[k])parts.push(MOD_NAMES[k]+": "+stats[k]+"nt");}for(var k in stats){if(order.indexOf(k)<0)parts.push(MOD_NAMES[k]+": "+stats[k]+"nt");}return parts.join(" &nbsp;|&nbsp; ");}
var MOD_NAMES={OMe:"2'-OMe",F:"2'-F",DNA:"DNA",VP:"VP",C22:"C22",eF:"eF",RNA:"RNA",OTHER:"其他",LINKER:"连接子",BACKBONE:"骨架"};
function makeLegend(){return '<div class="legend">'+'<div class="legend-item"><span class="legend-swatch" style="background:#dbeafe;"></span>2\'-OMe</div>'+'<div class="legend-item"><span class="legend-swatch" style="background:#fce7f3;"></span>2\'-F</div>'+'<div class="legend-item"><span class="legend-swatch" style="background:#fef3c7;"></span>DNA</div>'+'<div class="legend-item"><span class="legend-swatch" style="background:#d1fae5;"></span>VP</div>'+'<div class="legend-item"><span class="legend-swatch" style="background:#ede9fe;"></span>C22</div>'+'<div class="legend-item"><span class="legend-swatch" style="background:#f1f5f9;"></span>骨架/连接</div>'+'</div>';}

// ===== 配对视图 =====
function buildPairView(sTokens, aTokens) {
  if (!sTokens) return "";
  var snuc = sTokens.filter(function(t){return t.pos>0;});
  var anuc = aTokens.filter(function(t){return t.pos>0;});
  var sCount = snuc.length, aCount = anuc.length;
  var pairLen = Math.min(sCount, aCount);
  var h = '<div class="pair-view"><div style="font-weight:700;font-size:13px;margin-bottom:6px;">🔗 碱基配对对应关系</div><div class="muted" style="margin-bottom:4px;">同一列 = 配对的碱基（Sense#1 ↔ Anti#'+pairLen+'）</div>';
  h += '<div class="pair-row"><span class="pair-label">Sense</span>';
  for (var i=0; i<pairLen; i++) {var t=snuc[i];h+='<div class="pair-cell"><span class="pair-base mod-'+t.mod+'">'+esc(t.base)+'</span><span class="pair-pos">'+(i+1)+'</span></div>';}
  h += '</div><div class="pair-row"><span class="pair-label" style="font-size:10px;">配对</span>';
  for (var i=0; i<pairLen; i++) {var ai=pairLen-1-i,sb=snuc[i].base,ab=anuc[ai].base;var ok=(sb==='A'&&ab==='U')||(sb==='U'&&ab==='A')||(sb==='C'&&ab==='G')||(sb==='G'&&ab==='C')||(sb==='G'&&ab==='U')||(sb==='U'&&ab==='G');h+='<div style="min-width:26px;text-align:center;font-size:12px;color:'+(ok?'#22c55e':'#ef4444')+';">'+(ok?'⋮':'✗')+'</div>';}
  h += '</div><div class="pair-row"><span class="pair-label">Antisense</span>';
  for (var i=0; i<pairLen; i++) {var ai=pairLen-1-i,t=anuc[ai];if(!t){h+='<div class="pair-cell"><span class="pair-base" style="color:#94a3b8;">—</span><span class="pair-pos"></span></div>';continue;}h+='<div class="pair-cell"><span class="pair-base mod-'+t.mod+'">'+esc(t.base)+'</span><span class="pair-pos">'+(ai+1)+'</span></div>';}
  h += '</div>';
  if (aCount > pairLen) {h+='<div class="pair-row" style="margin-top:4px;"><span class="pair-label" style="color:#059669;">Overhang</span>';for(var i=pairLen;i<aCount;i++){var t=anuc[i];if(!t)continue;h+='<div class="pair-cell"><span class="pair-base" style="background:#ecfdf5;color:#065f46;">'+esc(t.base)+'</span><span class="pair-pos" style="color:#059669;">OH'+(i-pairLen+1)+'</span></div>';}h+='</div>';}
  return h+'</div>';
}

// ===== 格式对比（单条）=====
function compareSequences(seqA, seqB) {
  var tA = parseTokens(seqA).filter(function(t){return t.pos>0;});
  var tB = parseTokens(seqB).filter(function(t){return t.pos>0;});
  var maxLen = Math.max(tA.length, tB.length);
  var okCount=0,diffCount=0,gapCount=0,rows=[];
  for(var i=0;i<maxLen;i++){var a=tA[i]||null,b=tB[i]||null;if(!a){rows.push({st:"gapB",baseB:b.base,modB:b.mod,textB:b.text,pos:i+1});gapCount++;continue;}if(!b){rows.push({st:"gapA",baseA:a.base,modA:a.mod,textA:a.text,pos:i+1});gapCount++;continue;}var sb=a.base===b.base,sm=a.mod===b.mod;if(sb&&sm){rows.push({st:"ok",base:a.base,mod:a.mod,textA:a.text,textB:b.text,pos:i+1});okCount++;}else if(sb){rows.push({st:"modDiff",base:a.base,modA:a.mod,modB:b.mod,textA:a.text,textB:b.text,pos:i+1});diffCount++;}else{rows.push({st:"baseDiff",baseA:a.base,baseB:b.base,modA:a.mod,modB:b.mod,textA:a.text,textB:b.text,pos:i+1});diffCount++;}}
  return {tA:tA,tB:tB,rows:rows,ok:okCount,diff:diffCount,gap:gapCount,total:maxLen};
}

function buildCompareResultHtml(r, aR, bR, label) {
  var h = '<div class="result-block">';
  if (label) h += '<div class="pair-header">'+label+'</div>';
  h += '<div><span class="muted">序列 A</span></div>'+renderTokens(aR.tokens)+'<div class="stats">裸碱基: '+esc(aR.bases)+' ('+aR.bases.length+'nt) &nbsp;|&nbsp; '+makeStatStr(aR.stats, aR.bases.length)+'</div>';
  h += '<div style="margin-top:6px;"><span class="muted">序列 B</span></div>'+renderTokens(bR.tokens)+'<div class="stats">裸碱基: '+esc(bR.bases)+' ('+bR.bases.length+'nt) &nbsp;|&nbsp; '+makeStatStr(bR.stats, bR.bases.length)+'</div>';
  h += '<div class="pair-view"><div style="font-weight:700;font-size:13px;margin-bottom:4px;">逐位对比结果</div>';
  h += '<div style="font-size:12px;margin-bottom:4px;">✅ 一致 '+r.ok+'处'+(r.diff?' &nbsp;|&nbsp; 🔴 不同 '+r.diff+'处':'')+(r.gap?' &nbsp;|&nbsp; 🟣 长度差 '+r.gap+'处':'')+(r.diff+r.gap===0?' 🎉 完全等价！':'')+'</div>';
  h += '<div class="pair-row"><span class="pair-label">序列A</span>';
  for(var i=0;i<r.rows.length;i++){var row=r.rows[i];if(row.st==="gapB"){h+='<div class="pair-cell"><span class="pair-base" style="color:#94a3b8;">—</span><span class="pair-pos">'+row.pos+'</span></div>';continue;}h+='<div class="pair-cell"><span class="pair-base mod-'+row.mod+'">'+esc(row.textA)+'</span><span class="pair-pos">'+row.pos+'</span></div>';}
  h += '</div><div class="pair-row"><span class="pair-label" style="font-size:10px;">比对</span>';
  for(var i=0;i<r.rows.length;i++){var row=r.rows[i];var icon=row.st==="ok"?"✅":(row.st==="modDiff"?"⚠️":(row.st==="gapA"||row.st==="gapB"?"🟣":"🔴"));var color=row.st==="ok"?"#22c55e":(row.st==="modDiff"?"#f59e0b":"#ef4444");h+='<div style="min-width:26px;text-align:center;font-size:11px;color:'+color+'">'+icon+'</div>';}
  h += '</div><div class="pair-row"><span class="pair-label">序列B</span>';
  for(var i=0;i<r.rows.length;i++){var row=r.rows[i];if(row.st==="gapA"){h+='<div class="pair-cell"><span class="pair-base" style="color:#94a3b8;">—</span><span class="pair-pos">'+row.pos+'</span></div>';continue;}h+='<div class="pair-cell"><span class="pair-base mod-'+row.modB+'">'+esc(row.textB)+'</span><span class="pair-pos">'+row.pos+'</span></div>';}
  h += '</div></div>';
  var diffs=r.rows.filter(function(x){return x.st!=="ok";});
  if(diffs.length>0){h+='<div class="pair-view" style="margin-top:6px;"><b style="font-size:13px;">🔍 差异明细</b><table style="font-size:12px;margin-top:4px;width:auto;"><thead><tr><th>位点</th><th>A</th><th>B</th><th>问题</th></tr></thead><tbody>';for(var i=0;i<diffs.length;i++){var d=diffs[i];var prob=d.st==="modDiff"?"修饰不同("+d.modA+" vs "+d.modB+")":(d.st==="baseDiff"?"碱基不同("+d.baseA+" vs "+d.baseB+")":"长度差异");h+='<tr><td>'+d.pos+'</td><td>'+esc(d.textA||"-")+'</td><td>'+esc(d.textB||"-")+'</td><td>'+(d.st==="modDiff"?"⚠️ "+prob:(d.st==="baseDiff"?"🔴 "+prob:"🟣 "+prob))+'</td></tr>';}h+='</tbody></table></div>';}
  return h+'</div>';
}

function runCompare() {
  var seqA = document.getElementById("cmpA").value.trim();
  var seqB = document.getElementById("cmpB").value.trim();
  if (!seqA || !seqB) { alert("请填写序列 A 和序列 B"); return; }
  var r = compareSequences(seqA, seqB);
  var aR = analyze(seqA);
  var bR = analyze(seqB);
  document.getElementById("cmpResult").style.display="block";
  document.getElementById("cmpLegend").innerHTML = makeLegend();
  document.getElementById("cmpResultArea").innerHTML = buildCompareResultHtml(r, aR, bR, "");
}

// ===== 格式对比（批量）=====
function runBatchCompare() {
  var text = document.getElementById("batchCmpInput").value.trim();
  if (!text) { alert("请输入数据"); return; }
  var rows = text.split(/\r?\n/), data = [];
  for (var i=0; i<rows.length; i++) {var line=rows[i].trim();if(!line)continue;var cols=line.split(/\t/);if(cols.length<2)cols=line.split(/\s{2,}/);if(cols.length<2)continue;data.push({a:cols[0].trim(),b:cols[1].trim()});}
  if (data.length>1){var f=data[0];if(f.a.toLowerCase().includes("序列")||f.a.toLowerCase().includes("sense"))data.shift();}
  if (!data.length){alert("未解析到有效数据");return;}
  var html = "", okC=0, diffC=0;
  for (var i=0; i<data.length; i++) {
    var r = compareSequences(data[i].a, data[i].b);
    var aR = analyze(data[i].a), bR = analyze(data[i].b);
    var allOk = r.diff + r.gap === 0;
    if (allOk) okC++; else diffC++;
    html += buildCompareResultHtml(r, aR, bR, "第 " + (i+1) + " 组 " + (allOk ? '<span class="tag tag-ok">✅ 一致</span>' : '<span class="tag tag-bad">⚠️ 有差异</span>'));
  }
  document.getElementById("batchCmpResult").style.display="block";
  document.getElementById("batchCmpSummary").innerHTML = "共 "+data.length+" 组 &nbsp;|&nbsp; "+(okC?"✅ "+okC+" 组一致":"")+(diffC?" ⚠️ "+diffC+" 组有差异":"")+(diffC===0?" 🎉 全部等价！":"");
  document.getElementById("batchCmpResultArea").innerHTML = html;
}

// ===== siRNA 单条查看 =====
function makeResultHtml(aResult, sResult, label) {
  var html = '<div class="result-block">';
  if (label) html += '<div class="pair-header">'+esc(label)+'</div>';
  if (sResult) {
    html += '<div style="margin-bottom:6px;"><b>Sense</b><span class="muted" style="margin-left:6px;">5\'→3\'</span></div>';
    html += renderTokens(sResult.tokens);
    html += '<div class="stats">裸碱基: '+esc(sResult.bases)+' ('+sResult.bases.length+'nt)</div>';
    html += '<div style="margin:10px 0 6px;"><b>Antisense</b><span class="muted" style="margin-left:6px;">5\'→3\'</span></div>';
  }
  html += renderTokens(aResult.tokens);
  html += '<div class="stats">裸碱基: '+esc(aResult.bases)+' ('+aResult.bases.length+'nt)</div>';
  html += '<div class="stats">'+makeStatStr(aResult.stats, aResult.bases.length)+'</div></div>';
  if (sResult) html += buildPairView(sResult.tokens, aResult.tokens);
  return html;
}

function runSingle() {
  var anti = document.getElementById("antiInput").value.trim();
  var sense = document.getElementById("senseInput").value.trim();
  if (!anti) { alert("请填写 Antisense 序列"); return; }
  var aResult = analyze(anti);
  var sResult = sense ? analyze(sense) : null;
  document.getElementById("singleResult").style.display="block";
  document.getElementById("singleLegend").innerHTML = makeLegend();
  document.getElementById("singleResultArea").innerHTML = makeResultHtml(aResult, sResult, "");
  document.getElementById("singlePairView").innerHTML = "";
}

// ===== siRNA 批量查看 =====
function runBatch() {
  var text = document.getElementById("batchInput").value.trim();
  if (!text) { alert("请输入数据"); return; }
  var rows = text.split(/\r?\n/), data = [];
  for (var i=0; i<rows.length; i++) {var line=rows[i].trim();if(!line)continue;var cols=line.split(/\t/);if(cols.length<2)cols=line.split(/\s{2,}/);if(cols.length<1)continue;data.push({sense:cols.length>1?cols[0].trim():"",anti:cols.length>1?cols[1].trim():cols[0].trim()});}
  if(data.length>1){var f=data[0];if(f.sense.toLowerCase().includes("sense")||f.anti.toLowerCase().includes("anti"))data.shift();}
  if(!data.length){alert("未解析到有效数据");return;}
  var html="";
  for(var i=0;i<data.length;i++){if(!data[i].anti)continue;var aR=analyze(data[i].anti);var sR=data[i].sense?analyze(data[i].sense):null;html+=makeResultHtml(aR,sR,"第 "+(i+1)+" 组");}
  document.getElementById("batchResult").style.display="block";
  document.getElementById("batchLegend").innerHTML = makeLegend();
  document.getElementById("batchResultArea").innerHTML = html;
}
